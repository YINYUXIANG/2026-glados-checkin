name: GLaDOS Auto Checkin

on:
  workflow_dispatch:  # 允许手动运行
  schedule:
    - cron: "30 1 * * *"   # 每天北京时间 9:30 自动签到
    - cron: "30 13 * * *"  # 每天北京时间 21:30 自动签到（双保险）

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run checkin
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
        run: node index.js
